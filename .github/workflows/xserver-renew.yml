name: Xserver xmgame Auto Renew (Python)

on:
  schedule:
    - cron: '0 8 * * *'  # 每天 UTC+0 08:00 执行（北京时间 UTC+8 为 16:00，日本 UTC+9 为 17:00）
  workflow_dispatch:

concurrency:
  group: xserver-auto-renew
  cancel-in-progress: false 

env:
  PYTHONUNBUFFERED: 1 
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  run-auto-renew:
    name: Run Renewal Script
    runs-on: ubuntu-22.04
    timeout-minutes: 20 
    
    steps:
    - name: 📥 检出代码库
      uses: actions/checkout@v4

    - name: 🐍 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' 

    - name: 📦 安装 Python 依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🌐 安装 Playwright 及浏览器环境
      run: |
        playwright install --with-deps chromium

    - name: 🔤 安装系统日文/中文字体
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra

    - name: 🚀 执行多账户自动续期脚本
      env:
        XSERVER_ACCOUNTS: ${{ secrets.XSERVER_ACCOUNTS }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python main.py

    - name: 📁 归档并上传现场截图
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: task-screenshots-${{ github.run_id }}
        path: |
          *.png
          screenshots/*.png
        retention-days: 7
        if-no-files-found: ignore
